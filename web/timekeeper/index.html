<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f0f4f8" media="(prefers-color-scheme: light)">
  <title>Timekeeper</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Timekeeper</h1>

    <form id="entry-form" autocomplete="off">
      <label for="project">Project</label>
      <select id="project" required></select>

      <label for="date">Date</label>
      <input id="date" type="date" required>

      <div class="time-row">
        <div class="time-field">
          <label for="start">Start</label>
          <input id="start" type="time" step="900" required>
        </div>
        <div class="time-field">
          <label for="end">End</label>
          <input id="end" type="time" step="900" required>
        </div>
      </div>

      <label for="description">Description</label>
      <div id="chips" class="chips"></div>
      <input id="description" type="text" placeholder="What did you work on?" required>

      <button type="submit" id="submit-btn">Log it</button>
    </form>

    <div id="toast" class="toast" aria-live="polite"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
