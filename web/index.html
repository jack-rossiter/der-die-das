<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f0f4f8" media="(prefers-color-scheme: light)">
  <title>der / die / das</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>der · die · das</h1>
    <div class="search-wrap">
      <input
        id="search"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="sentences"
        spellcheck="false"
        placeholder="Nomen eingeben…"
        aria-label="German noun search"
      >
      <ul id="suggestions" class="suggestions" role="listbox"></ul>
    </div>
    <div id="result" class="result" aria-live="polite"></div>
    <div id="random" class="random" style="display:none" aria-live="polite"></div>
    <p class="hint" id="status">Wörterbuch wird geladen…</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
